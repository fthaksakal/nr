<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nazira'nın Rüyası</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="bird1.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Nazira">

    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        canvas { display: block; margin: 0 auto; background: #70c5ce; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 20; }
        .menu { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .game-title { font-size: 52px; font-weight: 900; color: #e31e24; line-height: 0.95; margin-bottom: 35px; text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .card { border: 3px solid #eee; padding: 10px; border-radius: 15px; cursor: pointer; background: white; position: relative; display: flex; flex-direction: column; align-items: center; }
        .card.active { border-color: #e31e24; background: #fff5f5; }
        .card.locked { cursor: not-allowed; opacity: 0.7; background: #f5f5f5; }
        .card.locked img { filter: grayscale(1) blur(1px); }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; }
        .card img { width: 45px; height: 45px; object-fit: contain; }
        button { background: #4caf50; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 20px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #2196f3; }
        .btn-gray { background: #9e9e9e; }
        #score-box { position: absolute; top: 30px; right: 30px; font-size: 45px; color: white; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); z-index: 50; }
        .hidden { display: none !important; }
        .high-score-text { font-size: 16px; color: #666; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="score-box" class="hidden">0</div>

<div id="ui-layer">
    <div id="main-menu" class="menu">
        <div class="game-title">Nazira'nın<br>Rüyası</div>
        <div id="best-score-main" class="high-score-text">En İyi: 0</div>
        <button onclick="showCharacterSelect()">OYNA</button>
        <button class="btn-gray" onclick="showSettings()">AYARLAR</button>
    </div>

    <div id="char-menu" class="menu hidden">
        <h2 style="margin-top:0;">Karakter Seç</h2>
        <div class="grid">
            <div class="card active" data-src="bird1.png"><img src="bird1.png"><span style="font-weight: bold; font-size: 14px;">Nazira</span></div>
            <div class="card locked"><img src="bird2.png"><div class="lock-overlay">🔒 Yakında</div></div>
            <div class="card locked"><img src="bird3.png"><div class="lock-overlay">🔒 Yakında</div></div>
            <div class="card locked"><img src="bird4.png"><div class="lock-overlay">🔒 Yakında</div></div>
        </div>
        <button onclick="startGame()">BAŞLA</button>
        <button class="btn-gray" onclick="showMainMenu()">GERİ</button>
    </div>

    <div id="settings-menu" class="menu hidden">
        <h2>Ayarlar</h2>
        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Ses Seviyesi</label>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" style="width:100%; margin-bottom:20px;" onchange="updateVolume(this.value)">
        <button onclick="showMainMenu()">KAYDET</button>
    </div>

    <div id="over-menu" class="menu hidden">
        <h2 id="final-text">Skor: 0</h2>
        <div id="best-score-over" class="high-score-text">En İyi: 0</div>
        <button onclick="restartGame()">TEKRAR DENE</button>
        <button class="btn-blue" onclick="showCharacterSelect()">KARAKTER SEÇ</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false }); // Performans için alpha kanalını kapattık
    const scoreEl = document.getElementById('score-box');
    
    canvas.width = Math.min(window.innerWidth, 400);
    canvas.height = window.innerHeight;

    let bird, pipes, treats, particles, score, gameRunning = false, selectedSrc = "bird1.png", bgX = 0;
    let globalVolume = 0.5, lastSoundIdx = -1;
    let currentSpeed = 2.8, currentBgSpeed = 1.2;
    const baseSpeed = 2.8, baseBgSpeed = 1.2;
    const grav = 0.25, jumpPower = -4.5, pipeW = 90, gap = 185;

    // RESİM VE SES ÖN YÜKLEME (CACHE)
    const bImg = new Image();
    const bgImg = new Image(); bgImg.src = 'background.png';
    const pSetImg = new Image(); pSetImg.src = 'pipeset.png';
    let pipeSpriteW = 0;
    pSetImg.onload = () => { pipeSpriteW = pSetImg.width / 5; };

    // SES OPTİMİZASYONU: Sesleri önceden yükle ve hazır beklet
    const sounds = [
        new Audio('meow1.mp3'), new Audio('meow2.mp3'), 
        new Audio('meow3.mp3'), new Audio('meow4.mp3')
    ];
    sounds.forEach(s => { s.load(); s.volume = globalVolume; });

    function updateBestScoreUI() {
        const best = localStorage.getItem('naziraBestScore') || 0;
        document.getElementById('best-score-main').innerText = "En İyi: " + best;
        document.getElementById('best-score-over').innerText = "En İyi: " + best;
    }

    function hideAll() { ['main-menu', 'char-menu', 'settings-menu', 'over-menu'].forEach(id => document.getElementById(id).classList.add('hidden')); }
    function showMainMenu() { updateBestScoreUI(); hideAll(); document.getElementById('main-menu').classList.remove('hidden'); }
    function showCharacterSelect() { hideAll(); document.getElementById('char-menu').classList.remove('hidden'); }
    function showSettings() { hideAll(); document.getElementById('settings-menu').classList.remove('hidden'); }
    function updateVolume(val) { globalVolume = val; sounds.forEach(s => s.volume = globalVolume); }

    function playRandomMeow() {
        if(globalVolume === 0) return;
        let idx;
        do { idx = Math.floor(Math.random() * sounds.length); } while (idx === lastSoundIdx);
        lastSoundIdx = idx;
        let s = sounds[idx];
        s.currentTime = 0; // Sesi başa sar (Takılmayı önler)
        s.play().catch(() => {}); // Kullanıcı etkileşimi yoksa hata vermemesi için
    }

    function init() {
        bird = { x: 60, y: canvas.height/2, w: 40, h: 30, vel: 0 };
        pipes = []; treats = []; particles = []; score = 0; bgX = 0;
        currentSpeed = baseSpeed; currentBgSpeed = baseBgSpeed;
        scoreEl.innerText = "0"; bImg.src = selectedSrc;
    }

    function startGame() { hideAll(); init(); scoreEl.classList.remove('hidden'); gameRunning = true; requestAnimationFrame(loop); }
    function restartGame() { hideAll(); init(); scoreEl.classList.remove('hidden'); gameRunning = true; requestAnimationFrame(loop); }
    
    function die() { 
        gameRunning = false; 
        const best = localStorage.getItem('naziraBestScore') || 0;
        if(score > best) localStorage.setItem('naziraBestScore', score);
        updateBestScoreUI();
        document.getElementById('final-text').innerText = "Skor: " + score; 
        document.getElementById('over-menu').classList.remove('hidden'); 
    }

    window.onmousedown = () => { if(gameRunning) bird.vel = jumpPower; };
    window.ontouchstart = (e) => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); if(gameRunning) bird.vel = jumpPower; } };

    function loop() {
        if(!gameRunning) return;
        
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Arka Plan
        if(bgImg.complete) {
            bgX -= currentBgSpeed;
            if(bgX <= -canvas.width) bgX = 0;
            ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);
        }

        bird.vel += grav; bird.y += bird.vel;

        // Karakter
        if(bImg.complete) {
            ctx.save();
            ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
            ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.vel * 0.1)));
            ctx.drawImage(bImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
            ctx.restore();
        }

        // Borular ve Mekanikler
        if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 250) {
            let h = Math.random() * (canvas.height - gap - 240) + 120;
            pipes.push({ x: canvas.width, y: h, done: false, feed: false, tId: Math.floor(Math.random()*5), bId: Math.floor(Math.random()*5) });
        }

        for(let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i]; p.x -= currentSpeed;

            // Boru Geçişi ve Ses
            if(!p.feed && bird.x > p.x) {
                p.feed = true;
                setTimeout(playRandomMeow, 0); // Sesi ana döngüyü bloklamaması için async tetikle
            }

            // Boru Çizimi
            if(pSetImg.complete && pipeSpriteW) {
                ctx.save(); ctx.translate(p.x + pipeW/2, p.y/2); ctx.scale(1, -1);
                ctx.drawImage(pSetImg, p.tId * pipeSpriteW, 0, pipeSpriteW, pSetImg.height, -pipeW/2, -p.y/2, pipeW, p.y);
                ctx.restore();
                ctx.drawImage(pSetImg, p.bId * pipeSpriteW, 0, pipeSpriteW, pSetImg.height, p.x, p.y + gap, pipeW, canvas.height - (p.y + gap));
            }

            // Çarpışma
            if (bird.x + bird.w > p.x + 5 && bird.x < p.x + pipeW - 5) {
                if (bird.y < p.y - 5 || bird.y + bird.h > p.y + gap + 5) { die(); return; }
            }

            if(!p.done && p.x + pipeW < bird.x) { 
                score++; scoreEl.innerText = score; p.done = true; 
                if(score % 5 === 0) { currentSpeed *= 1.05; currentBgSpeed *= 1.05; }
            }
            if(p.x + pipeW < -100) pipes.splice(i, 1);
        }

        if(bird.y > canvas.height || bird.y < -50) { die(); return; }
        requestAnimationFrame(loop);
    }

    updateBestScoreUI();
</script>
</body>
</html>
